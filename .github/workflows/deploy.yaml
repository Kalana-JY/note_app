name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write # needed for OIDC auth to AWS
  contents: read

env:
  AWS_REGION: us-east-1
  IMAGE_BACKEND: notes-backend
  IMAGE_FRONTEND: notes-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-notes-app
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }} ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build & push frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }} ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name notes-app-cluster --region ${{ env.AWS_REGION }}

      - name: Create Mongo secret
        run: |
          kubectl create secret generic mongo-secret \
            --from-literal=uri="${{ secrets.MONGO_URI }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/notes-backend backend=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          kubectl set image deployment/notes-frontend frontend=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
